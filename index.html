<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Sensibilidade | Pedroxyw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #000; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: white; }
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; top: 0; left: 0; }

        .card {
            position: relative; z-index: 10;
            background: rgba(0, 0, 0, 0.95);
            padding: 30px; border-radius: 15px;
            border: 1px solid #333;
            width: 380px; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        h2 { font-size: 1.5rem; margin-bottom: 5px; }
        p { font-size: 0.85rem; color: #888; margin-bottom: 25px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 10px; border: 1px solid white; background: transparent;
            color: white; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .tab-btn.active { background: white; color: black; }

        .content-section { display: none; text-align: left; }
        .content-section.active { display: block; }

        select, .btn-action { width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 0.9rem; }
        select { background: #000; border: 1px solid #444; color: white; outline: none; cursor: pointer; }

        .checkbox-group { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222; }
        .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.85rem; color: #ccc; }
        .check-item input { accent-color: #fff; width: 16px; height: 16px; cursor: pointer; }

        .btn-action { background: transparent; border: 1px solid white; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-action:hover { background: white; color: black; }
        .btn-solid { background: white; color: black; border: none; }

        .sensi-results { margin-top: 15px; font-size: 0.85rem; color: #fff; line-height: 1.8; display: none; border-top: 1px solid #222; padding-top: 15px; }
        .sensi-results b { color: #55aaff; }

        .progress-container { width: 100%; height: 6px; background: #222; border-radius: 10px; margin-top: 15px; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: white; transition: 1.5s ease; }
        .success-msg { color: #fff; font-size: 0.85rem; margin-top: 10px; display: none; text-align: center; }

        /* Estilo do botão de abrir jogo */
        #btn-abrir { background: #25d366; border: none; color: white; display: none; margin-top: 10px; }
        #btn-abrir:hover { background: #1eb954; color: white; }

        .footer { position: fixed; bottom: 20px; font-size: 0.75rem; color: #555; z-index: 10; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="card">
        <h2>Sensibilidade / Auxílio</h2>
        <p>Configure a sensibilidade para usar</p>

        <div class="tabs">
            <button id="t-sensi" class="tab-btn active" onclick="switchTab('sensi')">Sensi</button>
            <button id="t-aux" class="tab-btn" onclick="switchTab('auxilio')">Auxílio</button>
        </div>

        <div id="sensi" class="content-section active">
            <select id="marca" onchange="atualizarModelos()">
                <option value="">Selecione a marca</option>
                <option value="apple">Apple</option>
                <option value="samsung">Samsung</option>
                <option value="xiaomi">Xiaomi</option>
                <option value="motorola">Motorola</option>
                <option value="asus">Asus</option>
                <option value="realme">Realme</option>
                <option value="huawei">Huawei</option>
                <option value="lg">LG</option>
                <option value="sony">Sony</option>
                <option value="infinix">Infinix</option>
            </select>
            <select id="modelo"><option>Selecione o modelo</option></select>
            <button class="btn-action" onclick="gerarSensi()">Gerar</button>

            <div id="sensi-data" class="sensi-results">
                Modelo: <b id="res-mod">...</b><br>
                Geral: <b>94</b><br>
                Ponto Vermelho: <b>148</b><br>
                Mira 2x: <b>115</b><br>
                Mira 4x: <b>108</b><br>
                Tamanho do Botão: <b>52%</b>
            </div>
        </div>

        <div id="auxilio" class="content-section">
            <div class="checkbox-group">
                <label class="check-item"><input type="checkbox"> Otimizar FPS</label>
                <label class="check-item"><input type="checkbox"> Fixar Mira (Aimbot Static)</label>
                <label class="check-item"><input type="checkbox"> Limpar Cache de Sensibilidade</label>
                <label class="check-item"><input type="checkbox"> Retirar input lag</label>
            </div>
            <button class="btn-action btn-solid" onclick="injetar()">Injetar</button>
            <div class="progress-container" id="p-cont"><div class="progress-bar" id="p-bar"></div></div>
            <div class="success-msg" id="msg">✅ Injetado com sucesso!</div>
            <button id="btn-abrir" class="btn-action" onclick="abrirJogo()">Abrir Free Fire</button>
        </div>
    </div>

    <div class="footer">Desenvolvido por @pedroxyw</div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const dispositivos = {
            apple: ["iPhone 7", "iPhone 8", "iPhone X", "iPhone XR", "iPhone XS Max", "iPhone 11", "iPhone 12", "iPhone 13 Pro Max", "iPhone 14 Pro", "iPhone 15 Pro Max"],
            samsung: ["Galaxy S10", "Galaxy S20 FE", "Galaxy S21 Ultra", "Galaxy S22 Ultra", "Galaxy S23 Ultra", "Galaxy S24 Ultra", "Galaxy A10", "Galaxy A54", "Galaxy M54", "Galaxy Note 20 Ultra"],
            xiaomi: ["Redmi Note 8 Pro", "Redmi Note 9", "Redmi Note 10 Pro", "Redmi Note 11", "Redmi Note 12", "Poco X3 Pro", "Poco X5 Pro", "Poco F5 Pro", "Xiaomi 13 Ultra", "POCO C71"],
            motorola: ["Moto G8", "Moto G30", "Moto G60", "Moto G100", "Moto G84", "Edge 30 Ultra", "Edge 40 Neo"],
            asus: ["ROG Phone 3", "ROG Phone 5", "ROG Phone 6", "ROG Phone 7 Ultimate", "Zenfone 10"],
            realme: ["Realme 7 Pro", "Realme 8", "Realme 9 Pro+", "Realme 11 Pro+", "Realme GT Neo 3"],
            huawei: ["P30 Lite", "P40 Pro", "P50 Pro", "Mate 40 Pro", "Nova 10"],
            lg: ["LG K52", "LG K62", "LG Velvet", "LG G8X"],
            sony: ["Xperia 1 IV", "Xperia 5 IV", "Xperia 10 V"],
            infinix: ["Hot 11", "Hot 20", "Note 30 Pro", "Zero Ultra"]
        };

        function atualizarModelos() {
            const m = document.getElementById("marca").value;
            const s = document.getElementById("modelo");
            s.innerHTML = '<option>Selecione o modelo</option>';
            if(m && dispositivos[m]) {
                dispositivos[m].sort().forEach(d => {
                    let o = document.createElement("option"); o.text = d; o.value = d; s.add(o);
                });
            }
        }

        function switchTab(t) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function gerarSensi() {
            const mod = document.getElementById("modelo").value;
            if(mod.includes("Selecione")) return;
            document.getElementById("res-mod").innerText = mod;
            document.getElementById("sensi-data").style.display = "block";
        }

        function injetar() {
            const pCont = document.getElementById("p-cont");
            const pBar = document.getElementById("p-bar");
            const msg = document.getElementById("msg");
            const btnAbrir = document.getElementById("btn-abrir");

            pCont.style.display = "block"; 
            pBar.style.width = "0%"; 
            msg.style.display = "none";
            btnAbrir.style.display = "none";

            setTimeout(() => { 
                pBar.style.width = "100%"; 
                setTimeout(() => { 
                    msg.style.display = "block"; 
                    btnAbrir.style.display = "block";
                }, 1500); 
            }, 100);
        }

        function abrirJogo() {
            // Tenta abrir o Free Fire (Funciona em Android se instalado)
            window.location.href = "intent://#Intent;scheme=com.dts.freefireth;package=com.dts.freefireth;end";
            setTimeout(() => {
                window.location.href = "com.dts.freefireth://";
            }, 500);
        }

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 1.5 }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
