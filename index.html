<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Sensibilidade | Pedroxyw</title>
    <style>
        /* RESET E FONTE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #000; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: white; }
        
        /* FUNDO DE PARTÍCULAS */
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; top: 0; left: 0; }

        /* CARD PRINCIPAL */
        .card {
            position: relative; z-index: 10;
            background: rgba(0, 0, 0, 0.92);
            padding: 30px; border-radius: 12px;
            border: 1px solid #222;
            width: 380px; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        h2 { font-size: 1.5rem; margin-bottom: 5px; font-weight: 600; }
        p { font-size: 0.85rem; color: #888; margin-bottom: 25px; }

        /* ABAS (TABS) */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 10px; border: 1px solid white; background: transparent;
            color: white; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .tab-btn.active { background: white; color: black; }

        /* SEÇÕES DE CONTEÚDO */
        .content-section { display: none; text-align: left; }
        .content-section.active { display: block; }

        select, .btn-action { width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 0.9rem; }
        select { background: #000; border: 1px solid #333; color: white; outline: none; cursor: pointer; }
        select option { background: #111; color: white; }

        .checkbox-group { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222; }
        .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.85rem; color: #ccc; cursor: pointer; }
        .check-item input { accent-color: #fff; width: 16px; height: 16px; cursor: pointer; }

        .btn-action { background: transparent; border: 1px solid white; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-action:hover { background: white; color: black; }
        .btn-solid { background: white; color: black; border: none; }

        /* RESULTADOS DA SENSI */
        .sensi-results { margin-top: 15px; font-size: 0.85rem; color: #fff; line-height: 1.8; display: none; border-top: 1px solid #222; padding-top: 15px; }
        .sensi-results b { color: #55aaff; }

        /* BARRA DE PROGRESSO */
        .progress-container { width: 100%; height: 6px; background: #222; border-radius: 10px; margin-top: 15px; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: white; transition: 1.8s ease-in-out; }
        
        /* TEXTO HACKER (LOG) */
        #log-status { font-size: 0.7rem; color: #0f0; margin-top: 10px; font-family: monospace; display: none; text-align: center; }
        
        .success-msg { color: #fff; font-size: 0.85rem; margin-top: 12px; display: none; text-align: center; font-weight: 500; }

        .footer { position: fixed; bottom: 15px; font-size: 0.75rem; color: #444; z-index: 10; width: 100%; text-align: center; }
        .footer b { color: #666; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="card">
        <h2>Sensibilidade / Auxílio</h2>
        <p>Configure a sensibilidade para usar</p>

        <div class="tabs">
            <button id="t-sensi" class="tab-btn active" onclick="switchTab('sensi')">Sensi</button>
            <button id="t-aux" class="tab-btn" onclick="switchTab('auxilio')">Auxílio</button>
        </div>

        <div id="sensi" class="content-section active">
            <select id="marca" onchange="atualizarModelos()">
                <option value="">Selecione a marca</option>
                <option value="apple">Apple</option>
                <option value="samsung">Samsung</option>
                <option value="xiaomi">Xiaomi</option>
                <option value="motorola">Motorola</option>
                <option value="asus">Asus</option>
                <option value="realme">Realme</option>
                <option value="huawei">Huawei</option>
                <option value="lg">LG</option>
                <option value="sony">Sony</option>
                <option value="infinix">Infinix</option>
            </select>
            <select id="modelo"><option>Selecione o modelo</option></select>
            <button class="btn-action" onclick="gerarSensi()">Gerar Sensi</button>

            <div id="sensi-data" class="sensi-results">
                Modelo: <b id="res-mod">...</b><br>
                Geral: <b>98</b><br>
                Red Dot: <b>145</b><br>
                Mira 2x: <b>120</b><br>
                Mira 4x: <b>112</b><br>
                Botão: <b>53%</b>
            </div>
        </div>

        <div id="auxilio" class="content-section">
            <div class="checkbox-group">
                <label class="check-item"><input type="checkbox"> Calibrar sensibilidade</label>
                <label class="check-item"><input type="checkbox"> Antirrecoil (Reduzir Recuo)</label>
                <label class="check-item"><input type="checkbox"> Otimizar registro de tiro</label>
                <label class="check-item"><input type="checkbox"> Fixar mira (AimLock)</label>
                <label class="check-item"><input type="checkbox"> Remover Input Lag</label>
            </div>
            <button class="btn-action btn-solid" onclick="injetar()">Injetar Auxílio</button>
            <div class="progress-container" id="p-cont"><div class="progress-bar" id="p-bar"></div></div>
            <div id="log-status"></div>
            <div class="success-msg" id="msg">✅ INJETADO COM SUCESSO!</div>
        </div>
    </div>

    <div class="footer">Desenvolvido por <b>@nexus.sensix</b></div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // BANCO DE DADOS DE DISPOSITIVOS
        const dispositivos = {
            apple: ["iPhone 7", "iPhone 8", "iPhone X", "iPhone XR", "iPhone 11", "iPhone 11 Pro Max", "iPhone 12", "iPhone 13", "iPhone 13 Pro Max", "iPhone 14 Pro", "iPhone 15 Pro Max"],
            samsung: ["Galaxy S20 FE", "Galaxy S21 Ultra", "Galaxy S22 Ultra", "Galaxy S23 Ultra", "Galaxy S24 Ultra", "Galaxy A32", "Galaxy A54", "Galaxy M53", "Galaxy Note 20 Ultra"],
            xiaomi: ["Redmi Note 8 Pro", "Redmi Note 11", "Redmi Note 12", "Poco X3 Pro", "Poco X5 Pro", "Poco X6 Pro", "Poco F5 Pro", "Xiaomi 13 Ultra"],
            motorola: ["Moto G60", "Moto G84", "Moto G100", "Moto G200", "Edge 30 Ultra", "Edge 40 Neo"],
            asus: ["ROG Phone 5", "ROG Phone 6", "ROG Phone 7", "Zenfone 10"],
            realme: ["Realme 9 Pro+", "Realme 11 Pro+", "Realme GT Neo 3"],
            huawei: ["P30 Pro", "P50 Pro", "Nova 10"],
            lg: ["LG K62", "LG Velvet"],
            sony: ["Xperia 1 V", "Xperia 5 IV"],
            infinix: ["Hot 20", "Note 30 Pro", "Zero Ultra"]
        };

        function atualizarModelos() {
            const m = document.getElementById("marca").value;
            const s = document.getElementById("modelo");
            s.innerHTML = '<option>Selecione o modelo</option>';
            if(m && dispositivos[m]) {
                dispositivos[m].sort().forEach(d => {
                    let o = document.createElement("option"); o.text = d; o.value = d; s.add(o);
                });
            }
        }

        function switchTab(t) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function gerarSensi() {
            const mod = document.getElementById("modelo").value;
            if(mod.includes("Selecione")) return;
            document.getElementById("res-mod").innerText = mod;
            document.getElementById("sensi-data").style.display = "block";
        }

        function injetar() {
            const pCont = document.getElementById("p-cont");
            const pBar = document.getElementById("p-bar");
            const msg = document.getElementById("msg");
            const log = document.getElementById("log-status");
            const frases = ["> Localizando OBB...", "> Bypass detectado...", "> Aplicando Sensi VIP...", "> Concluído!"];
            
            pCont.style.display = "block";
            log.style.display = "block";
            pBar.style.width = "0%";
            msg.style.display = "none";

            let i = 0;
            let interval = setInterval(() => {
                if(i < frases.length) {
                    log.innerText = frases[i];
                    i++;
                } else { clearInterval(interval); }
            }, 500);

            setTimeout(() => {
                pBar.style.width = "100%";
                setTimeout(() => { 
                    msg.style.display = "block";
                    log.style.display = "none";
                }, 1800);
            }, 100);
        }

        // CONFIGURAÇÃO DAS PARTÍCULAS (FIX)
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 85, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2 },
                "size": { "value": 2, "random": false }, /* TAMANHO PEQUENO FIXO */
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.15, "width": 1 },
                "move": { "enable": true, "speed": 1.2 }
            },
            "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } },
            "retina_detect": true
        });
    </script>
</body>
</html>
